<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Canvas for Mountain & Lighting Animation -->
    <canvas id="mountainCanvas"></canvas>

    <main class="content-wrapper">
        <section id="hero" class="hero-section glass-panel">
            <div class="hero-content" id="hero-content">
                <p>Loading hero...</p>
            </div>
        </section>

        <section id="about" class="content-section glass-panel">
            <div id="about-content">
                <p>Loading about info...</p>
            </div>
        </section>

        <section id="education" class="content-section glass-panel">
            <h2 id="education-title">Education</h2>
            <div id="education-list">
                <p>Loading education info...</p>
            </div>
        </section>

        <section id="projects" class="content-section glass-panel">
            <h2 id="projects-title">Selected Works</h2>
            <div id="project-list" class="project-grid">
                <p>Loading projects...</p>
            </div>
        </section>

        <section id="papers" class="content-section glass-panel">
            <h2 id="papers-title">Publications & Papers</h2>
            <div id="paper-list" class="paper-list">
                <p>Loading papers...</p>
            </div>
        </section>

        <div class="split-row">
            <section id="photography" class="content-section glass-panel">
                <div id="photography-content">
                    <p>Loading photography...</p>
                </div>
            </section>

            <section id="contact" class="content-section glass-panel">
                <h2 id="contact-title">Get In Touch</h2>
                <p class="section-desc" id="contact-desc">Loading...</p>
                <div id="contact-list" class="contact-info">
                    <p>Loading contact info...</p>
                </div>
            </section>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
